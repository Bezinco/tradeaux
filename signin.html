<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Sign In — TradeAux</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #020617;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  color: #e5e7eb;
}
.container {
  max-width: 450px;
  margin: 0 auto;
  padding: 40px 24px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.gem-text {
  font-size: 64px;
  font-weight: 900;
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  background: linear-gradient(135deg, #00ced1, #7CFC00);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 20px;
}
.subtitle {
  text-align: center;
  color: #9ca3af;
  margin-bottom: 40px;
  font-size: 14px;
}
.auth-card {
  background: linear-gradient(145deg, rgba(15, 32, 64, 0.8), rgba(2, 6, 23, 0.95));
  border: 1px solid rgba(0, 206, 209, 0.3);
  border-radius: 20px;
  padding: 40px;
}
input {
  width: 100%;
  padding: 14px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(0,206,209,0.3);
  border-radius: 10px;
  color: white;
  font-family: inherit;
  margin-bottom: 16px;
  font-size: 14px;
}
button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #00ced1, #00ff7f);
  border: none;
  border-radius: 10px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 800;
  cursor: pointer;
  margin-top: 8px;
  font-size: 14px;
  color: #000;
  transition: all 0.3s ease;
}
button:hover:not(:disabled) {
  transform: scale(1.02);
  box-shadow: 0 0 20px rgba(0,206,209,0.4);
}
button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  transform: none;
}
.error {
  color: #ff6b6b;
  background: rgba(217,43,43,0.2);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  display: none;
  font-size: 13px;
}
.success {
  color: #7CFC00;
  background: rgba(124,252,0,0.1);
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 16px;
  display: none;
  font-size: 13px;
}
.toggle {
  text-align: center;
  margin-top: 20px;
  color: #9ca3af;
  font-size: 13px;
}
.toggle a {
  color: #00ced1;
  cursor: pointer;
  text-decoration: underline;
}
.role-label {
  font-size: 11px;
  color: #FFD966;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
  display: block;
}
.role-picker {
  margin-bottom: 20px;
}
.role-option {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  background: rgba(0,0,0,0.3);
  border: 2px solid rgba(0,206,209,0.15);
  border-radius: 12px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
}
.role-option:hover {
  border-color: #00ced1;
  background: rgba(0,206,209,0.08);
  transform: translateX(4px);
}
.role-option.selected {
  border-color: #7CFC00;
  background: rgba(124,252,0,0.1);
  box-shadow: 0 0 30px rgba(124,252,0,0.08);
}
.role-option .emoji {
  font-size: 28px;
}
.role-option .text {
  font-size: 16px;
  font-weight: 600;
}
.debug-info {
  font-size: 10px;
  color: #9ca3af;
  text-align: center;
  margin-top: 12px;
  font-family: monospace;
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-top: 12px;
}
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="container">
  <div class="gem-text">TRADEAUX</div>
  <div class="subtitle" id="subtitle">Sign in to your account</div>
  <div class="auth-card">
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <!-- STEP 1: SIGN IN FORM -->
    <div id="step1">
      <input type="email" id="email" placeholder="Email address" autocomplete="email">
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">
      <button id="signinBtn">Sign In</button>
      <div style="text-align:center; margin-top:12px;">
        <a href="#" id="forgotLink" style="font-size:12px; color:#00ced1; text-decoration:none;">Forgot password?</a>
      </div>
      <div class="toggle">No account? <a id="showSignup">Create one</a></div>
    </div>

    <!-- STEP 2: SIGN UP FORM -->
    <div id="step2" class="hidden">
      <input type="email" id="signupEmail" placeholder="Email address" autocomplete="email">
      <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" autocomplete="new-password">
      <input type="text" id="signupName" placeholder="Company / Organization Name">
      <button id="signupBtn">Create Account</button>
      <div class="toggle">Already have an account? <a id="showSignin">Sign in</a></div>
    </div>

    <!-- STEP 3: ROLE SELECTOR (SHOWS AFTER LOGIN) -->
    <div id="step3" class="hidden">
      <div style="text-align:center; margin-bottom:16px;">
        <div style="font-size:13px; color:#9ca3af;">Welcome!</div>
        <div style="font-size:16px; color:#7CFC00; margin-bottom:8px;" id="userEmailDisplay">user@example.com</div>
        <div style="font-size:13px; color:#9ca3af;">Select your dashboard to continue</div>
      </div>
      <div class="role-label">Choose Your Dashboard</div>
      <div class="role-picker">
        <div class="role-option" data-role="buyer"><span class="emoji">🛒</span><span class="text">Buyer</span></div>
        <div class="role-option" data-role="seller"><span class="emoji">🏭</span><span class="text">Seller</span></div>
        <div class="role-option" data-role="carrier"><span class="emoji">🚛</span><span class="text">Carrier</span></div>
        <div class="role-option" data-role="insurer"><span class="emoji">🛡️</span><span class="text">Insurer</span></div>
        <div class="role-option" data-role="banker"><span class="emoji">🏦</span><span class="text">Banker</span></div>
      </div>
      <button id="roleContinueBtn" disabled>Select a role first</button>
      <div style="text-align:center; margin-top:12px;">
        <a href="#" id="logoutAfterLogin" style="font-size:12px; color:#ff6b6b; text-decoration:none;">← Sign out</a>
      </div>
    </div>

    <div class="debug-info" id="debugInfo">Sign in first, then choose your role</div>
  </div>
</div>

<script>
// =====================================================
// SUPABASE CONFIGURATION
// =====================================================
const SUPABASE_URL = 'https://pfutaovwbygefummienf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmdXRhb3Z3YnlnZWZ1bW1pZW5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTM3OTIsImV4cCI6MjA5MzE2OTc5Mn0.K6KI5Dco1-i6MGMIgXfIUenb3pfE3LtqOMRq2qfar7I';

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =====================================================
// DASHBOARD MAPPING
// =====================================================
const DASHBOARDS = {
  'buyer': 'dashboard-buyer.html',
  'seller': 'dashboard-seller.html',
  'carrier': 'dashboard-transport.html',
  'insurer': 'dashboard-insurer.html',
  'banker': 'dashboard-banker.html',
  'admin': 'dashboard-admin.html'
};

// =====================================================
// URL PARAMS & STATE
// =====================================================
const urlParams = new URLSearchParams(window.location.search);
const isLogout = urlParams.get('logout') === '1';

let selectedRole = null;
let currentUser = null;
let authCheckComplete = false;

// =====================================================
// BULLETPROOF LOGOUT - CLEARS EVERYTHING
// =====================================================
async function bulletproofSignOut() {
  console.log('🔒 Starting bulletproof sign out...');

  // 1. Tell Supabase to sign out (global = all devices/tabs)
  try {
    await supabaseClient.auth.signOut({ scope: 'global' });
    console.log('✅ Supabase signOut completed');
  } catch (e) {
    console.log('⚠️ Supabase signOut error (ignoring):', e.message);
  }

  // 2. Wait a moment for Supabase to clean up its internal state
  await new Promise(r => setTimeout(r, 300));

  // 3. Remove ALL Supabase-related keys from localStorage
  const lsKeys = [];
  for (let i = 0; i < localStorage.length; i++) {
    lsKeys.push(localStorage.key(i));
  }
  lsKeys.forEach(key => {
    if (key && (key.includes('supabase') || key.startsWith('sb-'))) {
      localStorage.removeItem(key);
      console.log('🗑️ Removed localStorage key:', key);
    }
  });

  // 4. Clear sessionStorage entirely
  sessionStorage.clear();
  console.log('🗑️ sessionStorage cleared');

  // 5. Also clear any non-Supabase keys that might cache auth state
  localStorage.removeItem('tradeaux_user');
  localStorage.removeItem('tradeaux_role');

  console.log('🔒 Bulletproof sign out complete');
}

// =====================================================
// UI HELPERS
// =====================================================
function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
  setTimeout(() => { el.style.display = 'none'; }, 5000);
}

function redirectToDashboard(role) {
  const url = DASHBOARDS[role];
  if (!url) {
    showError('Unknown role. Redirecting to buyer.');
    setTimeout(() => { window.location.href = 'dashboard-buyer.html'; }, 2000);
    return;
  }
  document.getElementById('debugInfo').textContent = 'Redirecting to: ' + url;
  setTimeout(() => { window.location.href = url; }, 300);
}

async function showRolePicker(user) {
  currentUser = user;
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('step3').classList.remove('hidden');
  document.getElementById('subtitle').textContent = 'Choose your dashboard';

  // Fetch display name from profile
  let displayName = user.email;
  try {
    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('full_name, company_name')
      .eq('id', user.id)
      .single();
    if (profile) {
      displayName = profile.full_name || profile.company_name || user.email;
    }
  } catch (e) {
    console.log('Could not fetch profile for display name:', e);
  }

  document.getElementById('userEmailDisplay').textContent = 'Welcome, ' + displayName;
  document.getElementById('debugInfo').textContent = 'Logged in as: ' + displayName;
}

// =====================================================
// VALIDATE SESSION (check expiry)
// =====================================================
function isSessionValid(session) {
  if (!session) return false;
  if (!session.expires_at) return true; // no expiry = assume valid
  const now = Math.floor(Date.now() / 1000);
  const valid = session.expires_at > now;
  if (!valid) {
    console.log('⏰ Session expired at', session.expires_at, ', now is', now);
  }
  return valid;
}

// =====================================================
// MAIN AUTH CHECK
// =====================================================
async function checkAuth() {
  if (authCheckComplete) return;
  authCheckComplete = true;

  console.log('🚀 TradeAux Signin v6.0 - Auth check starting');

  // === CASE 1: LOGOUT FLAG ===
  if (isLogout) {
    console.log('🔓 Logout detected - performing full cleanup');
    await bulletproofSignOut();
    showSuccess('You have been signed out.');
    document.getElementById('debugInfo').textContent = 'Signed out. You can sign in again.';
    // Remove logout flag from URL without reloading
    const newUrl = window.location.pathname;
    window.history.replaceState({}, document.title, newUrl);
    return;
  }

  // === CASE 2: CHECK EXISTING SESSION ===
  console.log('🔍 Checking for existing session...');

  try {
    const { data, error } = await supabaseClient.auth.getSession();

    if (error) {
      console.log('⚠️ getSession error:', error.message);
      return; // Stay on sign-in form
    }

    if (!data || !data.session) {
      console.log('ℹ️ No session found - showing sign-in form');
      return; // Stay on sign-in form
    }

    // Validate session expiry
    if (!isSessionValid(data.session)) {
      console.log('⏰ Session expired - clearing and staying on form');
      await bulletproofSignOut();
      showError('Your session expired. Please sign in again.');
      return;
    }

    const user = data.session.user;
    console.log('✅ Valid session found for:', user.email);

    // Check if user already has a saved role
    let role = null;
    try {
      const { data: profile, error: profileError } = await supabaseClient
        .from('profiles')
        .select('role')
        .eq('id', user.id)
        .single();

      if (profileError) {
        console.log('Profile query error:', profileError.message);
      }

      if (profile && profile.role && DASHBOARDS[profile.role]) {
        role = profile.role;
      }
    } catch (e) {
      console.error('Error checking saved role:', e);
    }

    if (role) {
      // User has a saved role - redirect immediately, NO role picker
      console.log('✅ Saved role found:', role, '→ redirecting immediately');
      document.getElementById('debugInfo').textContent = 'Redirecting to ' + DASHBOARDS[role] + '...';
      redirectToDashboard(role);
    } else {
      // No saved role - show role picker (first time only)
      console.log('ℹ️ No saved role — showing role picker (first time)');
      showRolePicker(user);
    }

  } catch (err) {
    console.error('❌ Auth check failed:', err);
    showError('Authentication check failed. Please try again.');
  }
}

// =====================================================
// PAGE LOAD
// =====================================================
document.addEventListener('DOMContentLoaded', function() {
  checkAuth();

  // =====================================================
  // TOGGLE SIGNUP / SIGNIN
  // =====================================================
  document.getElementById('showSignup').addEventListener('click', function(e) {
    e.preventDefault();
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    document.getElementById('subtitle').textContent = 'Create your account';
  });

  document.getElementById('showSignin').addEventListener('click', function(e) {
    e.preventDefault();
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step1').classList.remove('hidden');
    document.getElementById('subtitle').textContent = 'Sign in to your account';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  });

  // =====================================================
  // SIGN IN - STEP 1
  // =====================================================
  document.getElementById('signinBtn').addEventListener('click', async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showError('Please enter email and password');
      return;
    }

    const btn = document.getElementById('signinBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ 
        email: email, 
        password: password 
      });

      if (error) throw error;

      showSuccess('✅ Signed in successfully!');

      // Check for saved role and redirect or show picker
      let role = null;
      try {
        const { data: profile } = await supabaseClient
          .from('profiles')
          .select('role')
          .eq('id', data.user.id)
          .single();
        if (profile && profile.role && DASHBOARDS[profile.role]) {
          role = profile.role;
        }
      } catch (e) {
        console.log('Could not fetch role after signin:', e);
      }

      if (role) {
        redirectToDashboard(role);
      } else {
        showRolePicker(data.user);
      }

    } catch (error) {
      showError(error.message);
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });

  // =====================================================
  // SIGN UP - STEP 2
  // =====================================================
  document.getElementById('signupBtn').addEventListener('click', async function() {
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const companyName = document.getElementById('signupName').value.trim();

    if (!email || !password) {
      showError('Please enter email and password');
      return;
    }

    if (password.length < 6) {
      showError('Password must be at least 6 characters');
      return;
    }

    if (!companyName) {
      showError('Please enter your Company / Organization name');
      return;
    }

    const btn = document.getElementById('signupBtn');
    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      const { data, error } = await supabaseClient.auth.signUp({
        email: email,
        password: password,
        options: {
          data: {
            full_name: companyName,
            company: companyName,
            role: 'buyer'
          }
        }
      });

      if (error) throw error;

      // If session is null, email confirmation is required
      if (data.user && !data.session) {
        showSuccess('✅ Account created! Check your email to confirm.');
        document.getElementById('step2').classList.add('hidden');
        document.getElementById('step1').classList.remove('hidden');
        document.getElementById('subtitle').textContent = 'Sign in to your account';
        btn.disabled = false;
        btn.textContent = 'Create Account';
        return;
      }

      // Email confirmation is disabled — auto sign-in
      if (data.user && data.session) {
        // Create profile
        const { error: profileError } = await supabaseClient.from('profiles').insert({
          id: data.user.id,
          email: email,
          full_name: companyName,
          company_name: companyName,
          role: 'buyer',
          wallet_balance: 0,
          created_at: new Date().toISOString()
        });

        if (profileError) {
          console.error('Profile creation failed:', profileError);
        }

        showSuccess('✅ Account created successfully!');
        showRolePicker(data.user);
      }

    } catch (error) {
      showError(error.message);
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });

  // =====================================================
  // ROLE SELECTOR - STEP 3
  // =====================================================
  document.querySelectorAll('.role-option').forEach(function(option) {
    option.addEventListener('click', function() {
      document.querySelectorAll('.role-option').forEach(function(opt) { 
        opt.classList.remove('selected'); 
      });
      this.classList.add('selected');
      selectedRole = this.dataset.role;

      const btn = document.getElementById('roleContinueBtn');
      btn.disabled = false;
      btn.textContent = 'Go to Dashboard →';

      document.getElementById('debugInfo').textContent = 'Selected: ' + selectedRole;
    });
  });

  document.getElementById('roleContinueBtn').addEventListener('click', async function() {
    if (!selectedRole) {
      showError('Please select a role first');
      return;
    }

    const btn = document.getElementById('roleContinueBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    // Save the role to the user's profile
    if (currentUser) {
      try {
        const { error } = await supabaseClient
          .from('profiles')
          .update({ role: selectedRole })
          .eq('id', currentUser.id);

        if (error) {
          console.warn('Could not save role:', error);
          showError('Could not save role. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Go to Dashboard →';
          return;
        }
        console.log('✅ Role saved:', selectedRole);
      } catch (e) {
        console.error('Error saving role:', e);
      }
    }

    redirectToDashboard(selectedRole);
  });

  // =====================================================
  // LOGOUT (from role picker)
  // =====================================================
  document.getElementById('logoutAfterLogin').addEventListener('click', async function(e) {
    e.preventDefault();
    await bulletproofSignOut();
    window.location.href = 'signin.html?logout=1&_t=' + Date.now();
  });

  // =====================================================
  // FORGOT PASSWORD
  // =====================================================
  document.getElementById('forgotLink').addEventListener('click', async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();

    if (!email) {
      showError('Enter your email first');
      return;
    }

    try {
      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/signin.html'
      });
      if (error) throw error;
      showSuccess('Password reset email sent!');
    } catch (err) {
      showError(err.message);
    }
  });

  // =====================================================
  // KEYBOARD SUPPORT
  // =====================================================
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (!document.getElementById('step1').classList.contains('hidden')) {
        document.getElementById('signinBtn').click();
      } else if (!document.getElementById('step2').classList.contains('hidden')) {
        document.getElementById('signupBtn').click();
      } else if (!document.getElementById('step3').classList.contains('hidden')) {
        if (!document.getElementById('roleContinueBtn').disabled) {
          document.getElementById('roleContinueBtn').click();
        }
      }
    }
  });

  console.log('✅ Ready - signin v6.0 with bulletproof auth');
});
</script>
</body>
</html>
