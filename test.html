<!-- THE DU HE OPTIMIZATION PANEL (Glassmorphism Style) -->
<div class="premium-dash-box" style="padding: 24px; margin-bottom: 20px;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <div>
      <h2 style="margin: 0; font-size: 1.4rem; color: #fff; letter-spacing: 0.5px;">"Du He" Optimization Engine</h2>
      <p style="margin: 4px 0 0 0; font-size: 0.85rem; color: #8a8a9e;">Real-time multi-variable knapsack matching matrix</p>
    </div>
    <div class="glow-metric-good" style="font-size: 1.1rem; padding: 6px 12px; background: rgba(0, 255, 170, 0.1); border-radius: 20px; border: 1px solid rgba(0, 255, 170, 0.2);">
      Target: 357 MT
    </div>
  </div>

  <!-- Live Mosaic Allocation Progress Bar -->
  <div style="width: 100%; height: 28px; background: rgba(255,255,255,0.05); border-radius: 6px; overflow: hidden; display: flex; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">
    <!-- Color-coded mosaic blocks representing active buyer allocations -->
    <div style="width: 35%; background: #4a00e0; border-right: 2px solid #1a1a24; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: bold;">Buyer A (125MT)</div>
    <div style="width: 28%; background: #8e2de2; border-right: 2px solid #1a1a24; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: bold;">Buyer B (100MT)</div>
    <div style="width: 22%; background: #f000ff; border-right: 2px solid #1a1a24; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; font-weight: bold;">Buyer C (78MT)</div>
    <!-- The 13MT gap filler that triggered the boolean logic -->
    <div style="width: 11%; background: #00ffaa; border-right: 2px solid #1a1a24; box-shadow: inset 0 0 10px rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #000; font-weight: bold; animation: pulse 1.5s infinite;">Fit: 13MT</div>
    <div style="width: 4%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 10px; color: #aaa;">4% Unfilled</div>
  </div>

  <!-- Key-Value Matching Criteria Row -->
  <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center;">
    <div style="background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px;">
      <span style="font-size: 0.75rem; color: #8a8a9e; display: block; margin-bottom: 4px;">Volume Clearance</span>
      <span class="glow-metric-good" style="font-size: 1.2rem;">96.4%</span>
    </div>
    <div style="background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px;">
      <span style="font-size: 0.75rem; color: #8a8a9e; display: block; margin-bottom: 4px;">Logistics Mix</span>
      <span style="font-size: 1.2rem; color: #fff; font-weight: bold;">80% EXW</span>
    </div>
    <div style="background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px;">
      <span style="font-size: 0.75rem; color: #8a8a9e; display: block; margin-bottom: 4px;">Payment Terms</span>
      <span style="font-size: 1.2rem; color: #fff; font-weight: bold;">Immediate</span>
    </div>
    <div style="background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px;">
      <span style="font-size: 0.75rem; color: #8a8a9e; display: block; margin-bottom: 4px;">Avg Clear Price</span>
      <span class="glow-metric-good" style="font-size: 1.2rem; color: #00e5ff; text-shadow: 0 0 10px rgba(0,229,255,0.3);">₱34.80/kg</span>
    </div>
  </div>
</div>
