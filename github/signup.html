<script>
// ========== FIREBASE CONFIG ==========
const firebaseConfig = {
  apiKey: "AIzaSyBgG8EQlNZFkK2G5WCldvFogGSZqUwm1U0",
  authDomain: "tradeaux-c72c7.firebaseapp.com",
  projectId: "tradeaux-c72c7",
  storageBucket: "tradeaux-c72c7.firebasestorage.app",
  messagingSenderId: "187412805510",
  appId: "1:187412805510:web:3e564135565d309b745e07",
  measurementId: "G-JL4PCGZR16"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let pendingGithubUser = null;

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 6000);
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

function showToast(msg, isError = false) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = `
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: ${isError ? 'rgba(217,43,43,0.9)' : '#0a1424cc'};
    backdrop-filter: blur(12px);
    padding: 12px 28px;
    border-radius: 60px;
    font-size: 0.85rem;
    border-left: 4px solid ${isError ? '#ff3b3b' : '#7CFC00'};
    z-index: 2000;
    color: white;
    font-family: 'Inter', sans-serif;
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 4000);
}

function setButtonLoading(btn, loading) {
  btn.disabled = loading;
  btn.dataset.originalText = btn.dataset.originalText || btn.textContent;
  btn.textContent = loading ? 'Please wait...' : btn.dataset.originalText;
}

function validatePassword(password) {
  const errors = [];
  if (password.length < 8) errors.push('At least 8 characters');
  if (!/[A-Z]/.test(password)) errors.push('One uppercase letter');
  if (!/[a-z]/.test(password)) errors.push('One lowercase letter');
  if (!/[0-9]/.test(password)) errors.push('One number');
  if (!/[!@#$%^&*()_+\-=\[\]{};':"\|,.<>\/?]/.test(password)) errors.push('One special character');
  return errors;
}

// ========== GITHUB SIGN UP ==========
document.getElementById('githubSignUp').addEventListener('click', async () => {
  hideError();
  const btn = document.getElementById('githubSignUp');
  setButtonLoading(btn, true);

  const provider = new firebase.auth.GithubAuthProvider();
  provider.addScope('read:user');
  provider.addScope('user:email');

  try {
    const result = await auth.signInWithPopup(provider);
    const user = result.user;

    // Check if profile exists
    const profileDoc = await db.collection('profiles').doc(user.uid).get();
    if (!profileDoc.exists) {
      // New user — show role selection modal
      pendingGithubUser = user;
      document.getElementById('roleModal').style.display = 'flex';
      setButtonLoading(btn, false);
      return;
    }

    // Existing user — redirect
    showToast('Welcome back!');
    setTimeout(() => redirectByRole(profileDoc.data().role), 1000);

  } catch (error) {
    console.error('GitHub auth error:', error);
    if (error.code === 'auth/popup-closed-by-user') {
      showError('Sign-in popup was closed. Please try again.');
    } else if (error.code === 'auth/account-exists-with-different-credential') {
      showError('An account already exists with this email using a different sign-in method.');
    } else if (error.code === 'auth/network-request-failed') {
      showError('Network error. Please check your connection and try again.');
    } else {
      showError(error.message);
    }
    setButtonLoading(btn, false);
  }
});

// Role modal handlers
document.getElementById('cancelRoleBtn').onclick = () => {
  document.getElementById('roleModal').style.display = 'none';
  pendingGithubUser = null;
};

document.getElementById('confirmRoleBtn').onclick = async () => {
  if (!pendingGithubUser) return;
  const role = document.getElementById('githubRoleSelect').value;
  const btn = document.getElementById('confirmRoleBtn');
  setButtonLoading(btn, true);

  try {
    await createUserProfile(pendingGithubUser, {
      fullName: pendingGithubUser.displayName || 'GitHub User',
      companyName: '',
      email: pendingGithubUser.email,
      role: role,
      provider: 'github'
    });

    document.getElementById('roleModal').style.display = 'none';
    pendingGithubUser = null;
    showToast('Account created! Redirecting...');
    setTimeout(() => redirectByRole(role), 1500);
  } catch (err) {
    showError('Failed to create profile: ' + err.message);
    setButtonLoading(btn, false);
  }
};

// ========== EMAIL/PASSWORD SIGN UP ==========
document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();

  const btn = document.getElementById('submitBtn');
  setButtonLoading(btn, true);

  const fullName = document.getElementById('fullName').value.trim();
  const companyName = document.getElementById('companyName').value.trim();
  const email = document.getElementById('email').value.trim();
  const role = document.getElementById('role').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  // Validation
  if (!fullName || !email || !password) {
    showError('Please fill in all required fields');
    setButtonLoading(btn, false);
    return;
  }

  if (password !== confirmPassword) {
    showError('Passwords do not match');
    setButtonLoading(btn, false);
    return;
  }

  const pwErrors = validatePassword(password);
  if (pwErrors.length > 0) {
    showError('Password must have: ' + pwErrors.join(', '));
    setButtonLoading(btn, false);
    return;
  }

  try {
    // 1. Create user with Firebase Auth
    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
    const user = userCredential.user;

    // 2. Update profile
    await user.updateProfile({ displayName: fullName });

    // 3. Create profile
    await createUserProfile(user, {
      fullName: fullName,
      companyName: companyName,
      email: email,
      role: role,
      provider: 'email'
    });

    showToast('Account created successfully! Redirecting...');
    setTimeout(() => redirectByRole(role), 1500);

  } catch (err) {
    console.error('Sign up error:', err);
    if (err.code === 'auth/email-already-in-use') {
      showError('An account with this email already exists. Please sign in instead.');
    } else if (err.code === 'auth/invalid-email') {
      showError('Invalid email address. Please check and try again.');
    } else if (err.code === 'auth/weak-password') {
      showError('Password is too weak. Please use a stronger password.');
    } else if (err.code === 'auth/network-request-failed') {
      showError('Network error. Please check your connection and try again.');
    } else {
      showError(err.message);
    }
    setButtonLoading(btn, false);
  }
});

// ========== CREATE USER PROFILE (shared helper) ==========
async function createUserProfile(user, data) {
  const batch = db.batch();

  const profileRef = db.collection('profiles').doc(user.uid);
  batch.set(profileRef, {
    uid: user.uid,
    full_name: data.fullName,
    fullName: data.fullName,
    companyName: data.companyName || '',
    email: data.email,
    role: data.role,
    photoURL: user.photoURL || '',
    provider: data.provider,
    country: '',
    phone: '',
    total_spent: 0,
    total_revenue: 0,
    total_trades: 0,
    win_rate: 0,
    rating: 0,
    created_at: firebase.firestore.FieldValue.serverTimestamp(),
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  const walletRef = db.collection('wallets').doc(user.uid);
  batch.set(walletRef, {
    userId: user.uid,
    balance: 0,
    held_amount: 0,
    email: data.email,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  const userRef = db.collection('users').doc(user.uid);
  batch.set(userRef, {
    name: data.fullName,
    email: data.email,
    photoURL: user.photoURL || '',
    provider: data.provider,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  await batch.commit();
}

// ========== REDIRECT ==========
function redirectByRole(role) {
  const urls = {
    buyer: 'dashboard-buyer.html',
    seller: 'dashboard-seller.html',
    carrier: 'dashboard-transport.html',
    admin: 'dashboard-admin.html'
  };
  window.location.href = urls[role] || 'dashboard-buyer.html';
}

// ========== AUTO-REDIRECT IF ALREADY SIGNED IN ==========
auth.onAuthStateChanged(async user => {
  if (user) {
    const profileDoc = await db.collection('profiles').doc(user.uid).get();
    if (profileDoc.exists) {
      showToast('Already signed in. Redirecting...');
      setTimeout(() => redirectByRole(profileDoc.data().role), 1000);
    }
  }
});
