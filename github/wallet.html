.wave-bg {
  position: absolute;

.wave-sapphire-bg {

  top: -30%; left: -10%; animation-delay: 8s;

.wave-ruby-bg {

const { createClient } = supabase;

let currentUser = null;
let walletBalance = 0;

document.addEventListener('DOMContentLoaded', () => {
  checkAuth();
});

async function checkAuth() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    window.location.href = 'signin.html';
    return;
  }

  currentUser = session.user;
  await loadWallet();
  await loadTransactions();
}

async function loadWallet() {
  const { data } = await supabaseClient
    .from('users')
    .select('wallet_balance')
    .eq('id', currentUser.id)
    .single();

  if (data) {
    walletBalance = data.wallet_balance;
    document.getElementById('walletBalance').textContent = `$${walletBalance.toFixed(2)}`;
  }
}

async function loadTransactions() {
  const { data } = await supabaseClient
    .from('wallet_transactions')
    .select('*')
    .eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });

  const list = document.getElementById('transactionList');

  if (!data || data.length === 0) {
    list.innerHTML = `
      <div class="transaction-item">
        <div class="transaction-info">
          <div class="transaction-type">No Transactions Yet</div>
          <div class="transaction-date">Make your first deposit or bid</div>
        </div>
        <div class="transaction-amount">—</div>
      </div>
    `;
    return;
  }

  list.innerHTML = data.map(tx => `
    <div class="transaction-item">
      <div class="transaction-info">
        <div class="transaction-type">${tx.type}</div>
        <div class="transaction-date">${new Date(tx.created_at).toLocaleDateString()}</div>
      </div>
      <div class="transaction-amount ${tx.amount >= 0 ? 'amount-positive' : 'amount-negative'}">
        ${tx.amount >= 0 ? '+' : ''}$${Math.abs(tx.amount).toFixed(2)}
      </div>
    </div>
  `).join('');
}

  const newBalance = walletBalance + amount;

  const { error: updateError } = await supabaseClient
    .from('users')
    .update({ wallet_balance: newBalance })
    .eq('id', currentUser.id);

  if (updateError) {
    showToast('Deposit failed', true);
    return;
  }

  // Record transaction
  await supabaseClient.from('wallet_transactions').insert([{
    user_id: currentUser.id,
    type: 'deposit',
    amount: amount,
    status: 'completed',
    created_at: new Date().toISOString()
  }]);

  walletBalance = newBalance;
  document.getElementById('walletBalance').textContent = `$${walletBalance.toFixed(2)}`;
  await loadTransactions();

  showToast(`Deposited $${amount} via Wise`);
}

async function signOut() {
  await supabaseClient.auth.signOut();
  window.location.href = 'index.html';
}

function showToast(msg, error) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast' + (error ? ' error' : '') + ' visible';
  setTimeout(() => toast.classList.remove('visible'), 3000);
}
</script>
