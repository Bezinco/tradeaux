<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — TradeAux</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #020617;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  color: #e5e7eb;
  overflow-x: hidden;
}

.bg-waves {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

.wave-bg {
  position: absolute;
  width: 200%;
  height: 200%;
  filter: blur(100px);
  opacity: 0.15;
  animation: waveBgDrift 24s ease-in-out infinite;
}

.wave-sapphire-bg { 
  background: radial-gradient(circle at 50% 50%, rgba(0, 206, 209, 0.4), transparent 70%); 
  top: -30%; left: -10%; 
}

@keyframes waveBgDrift {
  0% { transform: translate(0px, 0px) scale(1); }
  50% { transform: translate(40px, -30px) scale(1.05); }
  100% { transform: translate(-30px, 20px) scale(1); }
}

/* ===== 3D LOGO (SAME AS SIGNIN PAGE) ===== */
.gem-logo {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
  filter: drop-shadow(0 30px 50px rgba(0, 206, 209, 0.4));
  transform-style: preserve-3d;
  perspective: 1000px;
}

.gem-text {
  font-size: 64px;
  font-weight: 900;
  letter-spacing: -0.02em;
  display: flex;
  text-transform: uppercase;
  line-height: 0.9;
  font-family: 'Orbitron', sans-serif;
  gap: 2px;
}

.gem-letter {
  display: inline-block;
  position: relative;
  transform-style: preserve-3d;
  animation: letterFloat 6s ease-in-out infinite;
  filter: brightness(1.2);
}

.gem-letter:nth-child(1) { animation-delay: 0s; }
.gem-letter:nth-child(2) { animation-delay: 0.2s; }
.gem-letter:nth-child(3) { animation-delay: 0.4s; }
.gem-letter:nth-child(4) { animation-delay: 0.6s; }
.gem-letter:nth-child(5) { animation-delay: 0.8s; }
.gem-letter:nth-child(6) { animation-delay: 0.10s; }
.gem-letter:nth-child(7) { animation-delay: 0.30s; }
.gem-letter:nth-child(8) { animation-delay: 0.50s; }

@keyframes letterFloat {
  0%, 100% { transform: translateY(0px) rotateX(2deg) rotateY(2deg); }
  50% { transform: translateY(-8px) rotateX(5deg) rotateY(5deg); }
}

/* Letter T - Blue */
.gem-letter:nth-child(1)::before {
  content: attr(data-letter);
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(145deg, #001a4a 0%, #002a6e 15%, #0040a0 30%, #0055cc 45%, #0066ff 60%, #0055cc 75%, #002a6e 90%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 18px rgba(0, 102, 255, 0.35);
  transform: translateZ(2px);
}

/* Letter R - Green */
.gem-letter:nth-child(2)::before {
  content: attr(data-letter);
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(145deg, #004d1a 0%, #006622 15%, #009933 30%, #00b33c 45%, #00cc44 60%, #00b33c 75%, #006622 90%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 18px rgba(0, 204, 68, 0.35);
  transform: translateZ(2px);
}

/* Letter A - Red */
.gem-letter:nth-child(3)::before {
  content: attr(data-letter);
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(145deg, #2a0000 0%, #4a0000 15%, #7a0b0b 30%, #a61a1a 45%, #d92b2b 60%, #a61a1a 75%, #4a0000 90%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 18px rgba(217, 43, 43, 0.35);
  transform: translateZ(2px);
}

/* Letter D - Blue */
.gem-letter:nth-child(4)::before {
  content: attr(data-letter);
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(145deg, #001a4a 0%, #002a6e 15%, #0040a0 30%, #0055cc 45%, #0066ff 60%, #0055cc 75%, #002a6e 90%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 18px rgba(0, 102, 255, 0.35);
  transform: translateZ(2px);
}

/* Letter E - Green */
.gem-letter:nth-child(5)::before {
  content: attr(data-letter);
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(145deg, #004d1a 0%, #006622 15%, #009933 30%, #00b33c 45%, #00cc44 60%, #00b33c 75%, #006622 90%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 18px rgba(0, 204, 68, 0.35);
  transform: translateZ(2px);
}

/* Letter A - Red */
.gem-letter:nth-child(6)::before {
  content: attr(data-letter);
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(145deg, #2a0000 0%, #4a0000 15%, #7a0b0b 30%, #a61a1a 45%, #d92b2b 60%, #a61a1a 75%, #4a0000 90%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 18px rgba(217, 43, 43, 0.35);
  transform: translateZ(2px);
}

/* Letter U - Blue */
.gem-letter:nth-child(7)::before {
  content: attr(data-letter);
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(145deg, #001a4a 0%, #002a6e 15%, #0040a0 30%, #0055cc 45%, #0066ff 60%, #0055cc 75%, #002a6e 90%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 18px rgba(0, 102, 255, 0.35);
  transform: translateZ(2px);
}

/* Letter X - Green */
.gem-letter:nth-child(8)::before {
  content: attr(data-letter);
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(145deg, #004d1a 0%, #006622 15%, #009933 30%, #00b33c 45%, #00cc44 60%, #00b33c 75%, #006622 90%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 0 18px rgba(0, 204, 68, 0.35);
  transform: translateZ(2px);
}

.gem-letter .edge-top {
  position: absolute; top: -2px; left: 0; width: 100%; height: 20%;
  background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, transparent 100%);
  mix-blend-mode: overlay; pointer-events: none; z-index: 5;
}
.gem-letter .edge-right {
  position: absolute; top: 0; right: -2px; width: 10%; height: 100%;
  background: linear-gradient(270deg, rgba(255,255,255,0.5) 0%, transparent 100%);
  mix-blend-mode: overlay; pointer-events: none; z-index: 5;
}
.gem-letter .edge-bottom {
  position: absolute; bottom: -2px; left: 0; width: 100%; height: 20%;
  background: linear-gradient(0deg, rgba(50,0,0,0.4) 0%, transparent 100%);
  mix-blend-mode: multiply; pointer-events: none; z-index: 5;
}
.gem-letter .edge-left {
  position: absolute; top: 0; left: -2px; width: 10%; height: 100%;
  background: linear-gradient(90deg, rgba(50,0,0,0.3) 0%, transparent 100%);
  mix-blend-mode: multiply; pointer-events: none; z-index: 5;
}

.light-source {
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, rgba(0,206,209,0.1) 30%, transparent 70%);
  animation: rotateLight 15s linear infinite;
  pointer-events: none;
  z-index: 10;
  mix-blend-mode: overlay;
}

@keyframes rotateLight {
  0% { transform: rotate(0deg) scale(1); opacity: 0.3; }
  50% { transform: rotate(180deg) scale(1.2); opacity: 0.6; }
  100% { transform: rotate(360deg) scale(1); opacity: 0.3; }
}

.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 15px 3px white, 0 0 25px 6px #00ced1;
  animation: sparkleFlash 4s ease-in-out infinite;
  opacity: 0;
  z-index: 20;
  pointer-events: none;
}

@keyframes sparkleFlash {
  0% { opacity: 0; transform: scale(0.5); }
  10% { opacity: 1; transform: scale(1.2); }
  20% { opacity: 0.6; transform: scale(0.9); }
  30% { opacity: 1; transform: scale(1.1); }
  40% { opacity: 0; transform: scale(0.5); }
  100% { opacity: 0; transform: scale(0.5); }
}

.depth-shadow {
  position: absolute;
  bottom: -30px;
  left: 0;
  width: 100%;
  height: 60px;
  background: radial-gradient(ellipse at center, rgba(0,206,209,0.3) 0%, transparent 80%);
  filter: blur(20px);
  z-index: -1;
}

.container {
  max-width: 450px;
  margin: 0 auto;
  padding: 40px 24px;
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.subtitle {
  text-align: center;
  color: #9ca3af;
  margin-bottom: 40px;
  font-size: 14px;
}

.auth-card {
  background: linear-gradient(145deg, rgba(15, 32, 64, 0.8) 0%, rgba(2, 6, 23, 0.95) 100%);
  border: 1px solid rgba(0, 206, 209, 0.3);
  border-radius: 20px;
  padding: 40px;
  backdrop-filter: blur(20px);
}

.form-group {
  margin-bottom: 24px;
}

.form-label {
  display: block;
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  letter-spacing: 1px;
  color: #9ca3af;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 14px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(0, 206, 209, 0.3);
  border-radius: 10px;
  color: white;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  transition: all 0.3s;
}

.form-input:focus {
  border-color: #00ced1;
  box-shadow: 0 0 20px rgba(0, 206, 209, 0.2);
}

.submit-btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #00ced1, #00ff7f);
  color: #000;
  border: none;
  border-radius: 10px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 2px;
  cursor: pointer;
  text-transform: uppercase;
  margin-top: 8px;
  transition: all 0.3s;
}

.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0, 206, 209, 0.4);
}

.submit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.auth-links {
  text-align: center;
  margin-top: 24px;
  font-size: 14px;
  color: #9ca3af;
}

.auth-links a {
  color: #00ced1;
  text-decoration: none;
  font-weight: 600;
}

.error-msg {
  background: rgba(217, 43, 43, 0.2);
  border: 1px solid rgba(217, 43, 43, 0.5);
  color: #ff6b6b;
  padding: 12px;
  border-radius: 8px;
  font-size: 13px;
  margin-bottom: 16px;
  display: none;
}

.error-msg.visible {
  display: block;
}

.google-btn {
  width: 100%;
  padding: 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0, 206, 209, 0.3);
  border-radius: 10px;
  color: #e5e7eb;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.3s;
}

.google-btn:hover {
  background: rgba(0, 206, 209, 0.1);
  border-color: #00ced1;
}

.divider {
  text-align: center;
  margin: 20px 0;
  position: relative;
}

.divider::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 0;
  right: 0;
  height: 1px;
  background: rgba(255,255,255,0.1);
}

.divider span {
  background: linear-gradient(145deg, rgba(15, 32, 64, 0.8), rgba(2, 6, 23, 0.95));
  padding: 0 16px;
  position: relative;
  font-size: 12px;
  color: #9ca3af;
}
</style>
</head>
<body>

<div class="bg-waves">
  <div class="wave-bg wave-sapphire-bg"></div>
</div>

<div class="container">
  <div class="gem-logo">
    <div class="gem-text">
      <span class="gem-letter" data-letter="T">T<span class="edge-top"></span><span class="edge-right"></span><span class="edge-bottom"></span><span class="edge-left"></span></span>
      <span class="gem-letter" data-letter="R">R<span class="edge-top"></span><span class="edge-right"></span><span class="edge-bottom"></span><span class="edge-left"></span></span>
      <span class="gem-letter" data-letter="A">A<span class="edge-top"></span><span class="edge-right"></span><span class="edge-bottom"></span><span class="edge-left"></span></span>
      <span class="gem-letter" data-letter="D">D<span class="edge-top"></span><span class="edge-right"></span><span class="edge-bottom"></span><span class="edge-left"></span></span>
      <span class="gem-letter" data-letter="E">E<span class="edge-top"></span><span class="edge-right"></span><span class="edge-bottom"></span><span class="edge-left"></span></span>
      <span class="gem-letter" data-letter="A">A<span class="edge-top"></span><span class="edge-right"></span><span class="edge-bottom"></span><span class="edge-left"></span></span>
      <span class="gem-letter" data-letter="U">U<span class="edge-top"></span><span class="edge-right"></span><span class="edge-bottom"></span><span class="edge-left"></span></span>
      <span class="gem-letter" data-letter="X">X<span class="edge-top"></span><span class="edge-right"></span><span class="edge-bottom"></span><span class="edge-left"></span></span>
    </div>
    <div class="light-source"></div>
    <div class="depth-shadow"></div>
  </div>
  <div class="subtitle">Join the future of commodity trading</div>

  <div class="auth-card">
    <div class="error-msg" id="errorMsg"></div>
    
    <button class="google-btn" id="googleSignUp">
      <span>🔐</span> Continue with Google
    </button>

    <div class="divider"><span>OR</span></div>

    <form id="signupForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" id="fullName" required placeholder="John Doe">
      </div>

      <div class="form-group">
        <label class="form-label">Company / Co-op Name</label>
        <input type="text" class="form-input" id="companyName" required placeholder="Pacific Coconut Co-op">
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="email" required placeholder="you@company.com">
      </div>

      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-input" id="role">
          <option value="buyer">Buyer</option>
          <option value="seller">Seller / Co-op</option>
          <option value="carrier">Carrier / Logistics</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" required placeholder="••••••••">
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-input" id="confirmPassword" required placeholder="••••••••">
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">Create Account →</button>
    </form>

    <div class="auth-links">
      Already have an account? <a href="signin.html">Sign In</a>
    </div>
  </div>
</div>

<script>
// ===== YOUR MAIN TRADEAUX SUPABASE CONFIG =====
const SUPABASE_URL = 'https://pfutaovwbygefummienf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmdXRhb3Z3YnlnZWZ1bW1pZW5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTM3OTIsImV4cCI6MjA5MzE2OTc5Mn0.K6KI5Dco1-i6MGMIgXfIUenb3pfE3LtqOMRq2qfar7I';
const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  const el = document.getElementById('errorMsg');
  el.classList.remove('visible');
}

document.getElementById('signupForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideError();
  
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  const fullName = document.getElementById('fullName').value;
  const companyName = document.getElementById('companyName').value;
  const email = document.getElementById('email').value;
  const role = document.getElementById('role').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) {
    showError('Passwords do not match');
    btn.disabled = false;
    btn.textContent = 'Create Account →';
    return;
  }

  if (password.length < 6) {
    showError('Password must be at least 6 characters');
    btn.disabled = false;
    btn.textContent = 'Create Account →';
    return;
  }

  try {
    // 1. Sign up with Supabase Auth
    const { data: authData, error: authError } = await supabaseClient.auth.signUp({
      email,
      password,
      options: {
        data: {
          full_name: fullName,
          company_name: companyName,
          role: role
        }
      }
    });

    if (authError) throw authError;

    if (!authData.user) {
      throw new Error('Sign up failed. Please try again.');
    }

    // 2. Create profile in profiles table
    const { error: profileError } = await supabaseClient
      .from('profiles')
      .insert([
        {
          id: authData.user.id,
          full_name: fullName,
          company_name: companyName,
          email: email,
          role: role,
          created_at: new Date()
        }
      ]);

    if (profileError) {
      console.warn('Profile creation warning:', profileError);
    }

    // 3. Create wallet for the user
    const { error: walletError } = await supabaseClient
      .from('wallets')
      .insert([
        {
          user_id: authData.user.id,
          balance: 0,
          currency: 'USD'
        }
      ]);

    if (walletError) {
      console.warn('Wallet creation warning:', walletError);
    }

    // 4. Show success and redirect based on role
    showToast('Account created successfully! Redirecting...');
    
    setTimeout(() => {
      if (role === 'buyer') {
        window.location.href = 'dashboard-buyer.html';
      } else if (role === 'seller') {
        window.location.href = 'dashboard-seller.html';
      } else if (role === 'carrier') {
        window.location.href = 'dashboard-transport.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }, 1500);

  } catch (err) {
    showError(err.message);
    btn.disabled = false;
    btn.textContent = 'Create Account →';
  }
});

// Google Sign Up
document.getElementById('googleSignUp').addEventListener('click', async () => {
  try {
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/dashboard.html'
      }
    });
    if (error) throw error;
  } catch (error) {
    showError('Google sign up failed: ' + error.message);
  }
});

function showToast(msg) {
  const toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.cssText = `
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #0a1424cc;
    backdrop-filter: blur(12px);
    padding: 10px 24px;
    border-radius: 60px;
    font-size: 0.8rem;
    border-left: 4px solid #7CFC00;
    z-index: 2000;
    color: white;
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
</script>
</body>
</html>
