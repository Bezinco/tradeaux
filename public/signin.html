<script>
// ========== FIREBASE CONFIG ==========
const firebaseConfig = {
  apiKey: "AIzaSyBgG8EQlNZFkK2G5WCldvFogGSZqUwm1U0",
  authDomain: "tradeaux-c72c7.firebaseapp.com",
  projectId: "tradeaux-c72c7",
  storageBucket: "tradeaux-c72c7.firebasestorage.app",
  messagingSenderId: "187412805510",
  appId: "1:187412805510:web:3e564135565d309b745e07",
  measurementId: "G-JL4PCGZR16"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ========== ADMIN EMAILS ==========
// Add your admin email(s) here. These users get role='admin' on first sign-up.
const ADMIN_EMAILS = [
  // 'your-email@example.com',  // ← Replace with your email
];

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 5000);
}

function clearError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

// ========== TOGGLE VIEWS ==========
document.getElementById('showSignup').onclick = () => {
  document.getElementById('signinView').style.display = 'none';
  document.getElementById('signupView').style.display = 'block';
  document.getElementById('subtitleText').textContent = 'Create your account';
  clearError();
};

document.getElementById('showSignin').onclick = () => {
  document.getElementById('signupView').style.display = 'none';
  document.getElementById('signinView').style.display = 'block';
  document.getElementById('subtitleText').textContent = 'Welcome back';
  clearError();
};

// ========== GOOGLE SIGN IN ==========
document.getElementById('googleSigninBtn').onclick = async () => {
  clearError();
  const provider = new firebase.auth.GoogleAuthProvider();
  provider.addScope('email');
  provider.addScope('profile');

  try {
    const result = await auth.signInWithPopup(provider);
    const user = result.user;
    const isNewUser = result.additionalUserInfo?.isNewUser || false;

    if (isNewUser) {
      // Determine role: admin if email is in ADMIN_EMAILS
      const isAdmin = ADMIN_EMAILS.includes(user.email.toLowerCase());
      const role = isAdmin ? 'admin' : 'buyer';

      await db.collection('profiles').doc(user.uid).set({
        full_name: user.displayName || '',
        email: user.email,
        photoURL: user.photoURL || '',
        provider: 'google',
        role: role,
        country: '',
        phone: '',
        total_spent: 0,
        total_revenue: 0,
        total_trades: 0,
        win_rate: 0,
        rating: 0,
        created_at: firebase.firestore.FieldValue.serverTimestamp()
      });

      await db.collection('wallets').doc(user.uid).set({
        userId: user.uid,
        balance: 0,
        held_amount: 0,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      await db.collection('users').doc(user.uid).set({
        name: user.displayName || '',
        email: user.email,
        photoURL: user.photoURL || '',
        provider: 'google',
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
    } else {
      // Update last login for existing users
      await db.collection('profiles').doc(user.uid).update({
        last_login: firebase.firestore.FieldValue.serverTimestamp(),
        photoURL: user.photoURL || ''
      });
    }

    // onAuthStateChanged will handle redirect
  } catch (error) {
    if (error.code === 'auth/popup-closed-by-user') {
      showError('Sign-in popup was closed. Please try again.');
    } else if (error.code === 'auth/popup-blocked') {
      showError('Popup was blocked. Please allow popups for this site.');
    } else if (error.code === 'auth/account-exists-with-different-credential') {
      showError('An account already exists with this email using a different sign-in method.');
    } else if (error.code === 'auth/network-request-failed') {
      showError('Network error. Please check your connection and try again.');
    } else {
      showError(error.message);
    }
  }
};

// ========== EMAIL SIGN IN ==========
document.getElementById('signinBtn').onclick = async () => {
  clearError();
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;

  if (!email || !password) {
    showError('Please enter both email and password.');
    return;
  }

  const btn = document.getElementById('signinBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    await auth.signInWithEmailAndPassword(email, password);
    // onAuthStateChanged will handle redirect
  } catch (error) {
    btn.disabled = false;
    btn.textContent = 'Sign In';
    if (error.code === 'auth/user-not-found') {
      showError('No account found with this email. Create one below.');
    } else if (error.code === 'auth/wrong-password') {
      showError('Incorrect password. Try again.');
    } else if (error.code === 'auth/invalid-email') {
      showError('Please enter a valid email address.');
    } else if (error.code === 'auth/too-many-requests') {
      showError('Too many failed attempts. Please try again later.');
    } else {
      showError(error.message);
    }
  }
};

// ========== SIGN UP ==========
document.getElementById('signupBtn').onclick = async () => {
  clearError();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const name = document.getElementById('signupName').value.trim();

  if (!email || !password) {
    showError('Please enter email and password.');
    return;
  }
  if (password.length < 6) {
    showError('Password must be at least 6 characters.');
    return;
  }

  const btn = document.getElementById('signupBtn');
  btn.disabled = true;
  btn.textContent = 'Creating account...';

  try {
    const result = await auth.createUserWithEmailAndPassword(email, password);
    const user = result.user;

    // Determine role: admin if email is in ADMIN_EMAILS, otherwise buyer
    const isAdmin = ADMIN_EMAILS.includes(email.toLowerCase());
    const role = isAdmin ? 'admin' : 'buyer';

    // Update auth profile
    await user.updateProfile({ displayName: name || email.split('@')[0] });

    // Create profile in Firestore
    await db.collection('profiles').doc(user.uid).set({
      full_name: name || email.split('@')[0],
      email: email,
      photoURL: '',
      provider: 'email',
      role: role,
      country: '',
      phone: '',
      total_spent: 0,
      total_revenue: 0,
      total_trades: 0,
      win_rate: 0,
      rating: 0,
      created_at: firebase.firestore.FieldValue.serverTimestamp()
    });

    // Create wallet
    await db.collection('wallets').doc(user.uid).set({
      userId: user.uid,
      balance: 0,
      held_amount: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // Also maintain users collection for backwards compatibility
    await db.collection('users').doc(user.uid).set({
      name: name || email.split('@')[0],
      email: email,
      provider: 'email',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    showToast('Account created! Redirecting...');
    // onAuthStateChanged will handle redirect
  } catch (error) {
    btn.disabled = false;
    btn.textContent = 'Create Account';
    if (error.code === 'auth/email-already-in-use') {
      showError('An account with this email already exists. Sign in instead.');
    } else if (error.code === 'auth/invalid-email') {
      showError('Please enter a valid email address.');
    } else if (error.code === 'auth/weak-password') {
      showError('Password is too weak. Use at least 6 characters.');
    } else {
      showError(error.message);
    }
  }
};

// ========== SIGN OUT ==========
document.getElementById('signoutBtn').onclick = async () => {
  try {
    await auth.signOut();
    document.getElementById('signinView').style.display = 'block';
    document.getElementById('userView').classList.remove('visible');
    document.getElementById('subtitleText').textContent = 'Welcome back';
    clearError();
  } catch (err) {
    showError('Sign out failed: ' + err.message);
  }
};

// ========== SHOW SIGNED-IN USER ==========
async function showUser(user) {
  document.getElementById('signinView').style.display = 'none';
  document.getElementById('signupView').style.display = 'none';
  document.getElementById('userView').classList.add('visible');

  const profileDoc = await db.collection('profiles').doc(user.uid).get();
  const profile = profileDoc.exists ? profileDoc.data() : {};
  const role = profile.role || 'buyer';
  const name = profile.full_name || user.displayName || user.email.split('@')[0];

  // Show Google avatar if available, otherwise emoji
  const avatarEl = document.getElementById('userAvatar');
  if (user.photoURL) {
    avatarEl.innerHTML = '<img src="' + user.photoURL + '" style="width:60px;height:60px;border-radius:50%;object-fit:cover;">"';
  } else {
    avatarEl.textContent = '👤';
  }

  document.getElementById('userName').textContent = name;
  document.getElementById('userEmail').textContent = user.email;
  document.getElementById('userRole').textContent = role;

  // Update continue button based on role
  const continueBtn = document.getElementById('continueBtn');
  if (role === 'admin') {
    continueBtn.href = 'dashboard-admin.html';
    document.getElementById('userRole').textContent = '👑 Admin';
    document.getElementById('userRole').style.color = '#FFD966';
  } else if (role === 'seller') {
    continueBtn.href = 'seller-auction.html';
    document.getElementById('userRole').textContent = '🏪 Seller';
    document.getElementById('userRole').style.color = '#00D4FF';
  } else {
    continueBtn.href = 'dashboard-buyer.html';
    document.getElementById('userRole').textContent = '🛒 Buyer';
    document.getElementById('userRole').style.color = '#7CFC00';
  }
}

// ========== TOAST ==========
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#0a1424cc;backdrop-filter:blur(12px);padding:10px 24px;border-radius:60px;font-size:0.8rem;border-left:4px solid #7CFC00;color:#fff;z-index:200;white-space:nowrap;transition:0.2s;';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.style.opacity = '1');
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 200); }, 3000);
}

// ========== AUTH STATE LISTENER ==========
auth.onAuthStateChanged(async user => {
  if (user) {
    await showUser(user);
    // Auto-redirect after 1.5s so user sees their role badge
    const profileDoc = await db.collection('profiles').doc(user.uid).get();
    const role = profileDoc.exists ? profileDoc.data().role : 'buyer';
    setTimeout(() => {
      if (role === 'admin') {
        window.location.href = 'dashboard-admin.html';
      } else if (role === 'seller') {
        window.location.href = 'seller-auction.html';
      } else {
        window.location.href = 'dashboard-buyer.html';
      }
    }, 1500);
  }
});

// ========== ENTER KEY SUPPORT ==========
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('signinBtn').click();
});
document.getElementById('signupPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('signupBtn').click();
});
</script>
