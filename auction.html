<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeAux • Seller Auction</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020617; color: #F0F3FA; font-family: system-ui, sans-serif; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    button { background: #10b981; border: none; padding: 12px 28px; border-radius: 40px; font-weight: bold; cursor: pointer; margin: 5px; font-size: 14px; color: #010101; }
    .reset { background: #ef4444; color: white; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
    .market-card { background: #0B1122; border-radius: 20px; border: 1px solid #7CFC00; padding: 15px; position: relative; }
    .rank-flag { position: absolute; top: -10px; left: 10px; background: #FFD966; color: #0A0C15; padding: 4px 12px; border-radius: 20px; font-weight: bold; }
    .price { font-size: 28px; font-weight: bold; color: #FFD966; text-align: center; margin: 10px 0; }
    .accept-btn { width: 100%; margin-top: 10px; padding: 8px; background: #10b981; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
    .timer { font-size: 52px; font-family: monospace; color: #7CFC00; text-align: center; margin: 20px 0; }
    .stats { display: flex; gap: 20px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
    .stat { background: #0a0a1a; padding: 10px 24px; border-radius: 40px; border: 1px solid #7CFC00; }
    .stat-value { font-size: 24px; font-weight: bold; color: #7CFC00; }
    .log { background: #0a0a1a; padding: 10px; border-radius: 8px; font-size: 11px; margin-top: 20px; max-height: 200px; overflow-y: auto; font-family: monospace; }
  </style>
</head>
<body>
<div class="container">
  <h1>🌴 TRADEAUX SELLER AUCTION</h1>
  
  <div>
    <button id="startBtn">START 3-MIN AUCTION</button>
    <button id="resetBtn" class="reset">RESET</button>
    <button id="testBtn">TEST EDGE FUNCTION</button>
  </div>
  
  <div class="stats">
    <div class="stat">BIDS <div class="stat-value" id="bidCount">0</div></div>
    <div class="stat">HIGHEST <div class="stat-value" id="highestBid">$0.00</div></div>
    <div class="stat">REMAINING <div class="stat-value" id="remainingQty">0</div></div>
  </div>
  
  <div class="timer" id="timer">--:--</div>
  <div class="cards-grid" id="cardsGrid"></div>
  <div class="log" id="log">[READY] Click START to begin 3-minute auction.</div>
</div>

<script>
const SUPABASE_URL = 'https://pfutaovwbygefummienf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmdXRhb3Z3YnlnZWZ1bW1pZW5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc1OTM3OTIsImV4cCI6MjA5MzE2OTc5Mn0.K6KI5Dco1-i6MGMIgXfIUenb3pfE3LtqOMRq2qfar7I';

const headers = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json'
};

let currentAuctionId = null;
let timerInterval = null;

function log(msg) {
  const logDiv = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  logDiv.innerHTML = '[' + time + '] ' + msg + '\n' + logDiv.innerHTML;
  console.log(msg);
}

async function apiFetch(path, options = {}) {
  const url = SUPABASE_URL + '/rest/v1/' + path;
  const response = await fetch(url, { ...options, headers: headers });
  if (!response.ok) throw new Error(await response.text());
  return response.json();
}

async function loadAuction() {
  try {
    const auctions = await apiFetch('auctions?select=*&status=eq.active&order=created_at.desc&limit=1');
    if (!auctions || auctions.length === 0) {
      document.getElementById('cardsGrid').innerHTML = '<div style="text-align:center;padding:40px;">No active auction. Click START.</div>';
      document.getElementById('timer').innerHTML = '00:00';
      document.getElementById('startBtn').disabled = false;
      if (timerInterval) clearInterval(timerInterval);
      return;
    }
    const auction = auctions[0];
    currentAuctionId = auction.id;
    document.getElementById('remainingQty').innerHTML = auction.remaining_quantity_kg;
    
    const endTime = new Date(auction.end_time);
    const now = new Date();
    const diff = Math.max(0, Math.floor((endTime - now) / 1000));
    
    if (diff <= 0) {
      document.getElementById('timer').innerHTML = '00:00';
      log('Auction already ended');
    } else {
      const mins = Math.floor(diff / 60);
      const secs = diff % 60;
      document.getElementById('timer').innerHTML = (mins < 10 ? '0' + mins : mins) + ':' + (secs < 10 ? '0' + secs : secs);
      
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(function() {
        const now2 = new Date();
        const diff2 = Math.max(0, Math.floor((endTime - now2) / 1000));
        if (diff2 <= 0) {
          clearInterval(timerInterval);
          document.getElementById('timer').innerHTML = '00:00';
          log('Auction ended!');
        } else {
          const mins2 = Math.floor(diff2 / 60);
          const secs2 = diff2 % 60;
          document.getElementById('timer').innerHTML = (mins2 < 10 ? '0' + mins2 : mins2) + ':' + (secs2 < 10 ? '0' + secs2 : secs2);
        }
      }, 1000);
    }
    
    document.getElementById('startBtn').disabled = true;
    await loadBids();
  } catch (err) {
    log('Error loading auction: ' + err.message);
  }
}

async function loadBids() {
  if (!currentAuctionId) return;
  try {
    const bids = await apiFetch('bids?select=*&auction_id=eq.' + currentAuctionId + '&status=eq.pending&order=price_per_kg.desc');
    const container = document.getElementById('cardsGrid');
    if (!bids || bids.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:40px;">No bids yet. Bots will bid soon...</div>';
      document.getElementById('bidCount').innerHTML = '0';
      document.getElementById('highestBid').innerHTML = '$0.00';
      return;
    }
    let html = '';
    for (let i = 0; i < bids.length; i++) {
      const b = bids[i];
      const total = (b.price_per_kg * b.quantity_kg).toLocaleString();
      html += '<div class="market-card">';
      html += '<div class="rank-flag">#' + (i + 1) + '</div>';
      html += '<div style="font-size:40px;text-align:center;">🤖</div>';
      html += '<div style="font-weight:bold;text-align:center;">' + b.buyer_name + '</div>';
      html += '<div class="price">$' + b.price_per_kg.toFixed(2) + '/kg</div>';
      html += '<div style="text-align:center;">📦 ' + b.quantity_kg.toLocaleString() + ' kg</div>';
      html += '<div style="text-align:center;">💰 Total: $' + total + '</div>';
      html += '<button class="accept-btn" onclick="acceptBid(\'' + b.id + '\', ' + b.quantity_kg + ', ' + b.price_per_kg + ', \'' + b.buyer_name + '\')">ACCEPT</button>';
      html += '</div>';
    }
    container.innerHTML = html;
    document.getElementById('bidCount').innerHTML = bids.length;
    const highest = Math.max.apply(Math, bids.map(function(b) { return b.price_per_kg; }));
    document.getElementById('highestBid').innerHTML = '$' + highest.toFixed(2);
  } catch (err) {
    log('Error loading bids: ' + err.message);
  }
}

window.acceptBid = async function(bidId, quantity, price, buyerName) {
  const remaining = parseInt(document.getElementById('remainingQty').innerHTML);
  if (quantity > remaining) {
    log('Cannot accept ' + quantity + 'kg - only ' + remaining + 'kg left');
    return;
  }
  try {
    await apiFetch('bids?id=eq.' + bidId, { method: 'PATCH', body: JSON.stringify({ status: 'accepted' }) });
    const newRemaining = remaining - quantity;
    await apiFetch('auctions?id=eq.' + currentAuctionId, { method: 'PATCH', body: JSON.stringify({ remaining_quantity_kg: newRemaining }) });
    document.getElementById('remainingQty').innerHTML = newRemaining;
    log('ACCEPTED: ' + buyerName + ' - ' + quantity + 'kg @ $' + price + '/kg');
    await loadBids();
    if (newRemaining <= 0) {
      log('INVENTORY SOLD OUT!');
      if (timerInterval) clearInterval(timerInterval);
    }
  } catch (err) {
    log('Accept error: ' + err.message);
  }
};

async function startAuction() {
  log('Starting 3-minute auction...');
  try {
    const sellers = await apiFetch('sellers?select=id&limit=1');
    if (!sellers || sellers.length === 0) {
      log('ERROR: No seller found!');
      return;
    }
    
    // End any existing active auctions
    await apiFetch('auctions?status=eq.active', { method: 'PATCH', body: JSON.stringify({ status: 'ended' }) });
    
    // Calculate end time - add 3 minutes to CURRENT time
    const now = new Date();
    const endTime = new Date(now.getTime() + 3 * 60000);
    
    log('Auction starts: ' + now.toLocaleTimeString());
    log('Auction ends: ' + endTime.toLocaleTimeString());
    
    const newAuction = await apiFetch('auctions', {
      method: 'POST',
      body: JSON.stringify({
        seller_id: sellers[0].id,
        product_name: 'Coconut Auction ' + now.toLocaleTimeString(),
        product_category: 'coconuts',
        total_quantity_kg: 25000,
        remaining_quantity_kg: 25000,
        origin_country: 'Sri Lanka',
        fob_port: 'Colombo',
        quality_specs: { moisture: 10 },
        certificates: { organic: true },
        status: 'active',
        end_time: endTime.toISOString()
      })
    });
    
    log('Auction created! ID: ' + (newAuction[0]?.id || 'unknown'));
    log('Auction will run for 3 minutes');
    
    setTimeout(function() { loadAuction(); }, 500);
    
    // Trigger buyer-bot after 2 seconds
    setTimeout(function() {
      log('Triggering buyer-bot edge function...');
      fetch(SUPABASE_URL + '/functions/v1/buyer-bot', { method: 'POST', headers: headers })
        .then(function(r) { return r.json(); })
        .then(function(result) { log('Bot result: ' + JSON.stringify(result)); })
        .catch(function(err) { log('Bot error: ' + err.message); });
    }, 2000);
    
  } catch (err) {
    log('Start error: ' + err.message);
  }
}

async function resetAll() {
  log('Resetting...');
  try {
    if (currentAuctionId) {
      await apiFetch('bids?auction_id=eq.' + currentAuctionId, { method: 'DELETE' });
      await apiFetch('auctions?id=eq.' + currentAuctionId, { method: 'DELETE' });
    }
    await apiFetch('auctions?status=eq.active', { method: 'PATCH', body: JSON.stringify({ status: 'ended' }) });
    currentAuctionId = null;
    document.getElementById('remainingQty').innerHTML = '0';
    document.getElementById('bidCount').innerHTML = '0';
    document.getElementById('highestBid').innerHTML = '$0.00';
    document.getElementById('cardsGrid').innerHTML = '<div style="text-align:center;padding:40px;">Reset complete. Click START.</div>';
    document.getElementById('timer').innerHTML = '00:00';
    document.getElementById('startBtn').disabled = false;
    if (timerInterval) clearInterval(timerInterval);
    log('Reset complete!');
  } catch (err) {
    log('Reset error: ' + err.message);
  }
}

async function testEdgeFunction() {
  log('Testing buyer-bot edge function...');
  try {
    const response = await fetch(SUPABASE_URL + '/functions/v1/buyer-bot', { method: 'POST', headers: headers });
    const result = await response.json();
    log('Result: ' + JSON.stringify(result));
  } catch (err) {
    log('Error: ' + err.message);
  }
}

document.getElementById('startBtn').onclick = startAuction;
document.getElementById('resetBtn').onclick = resetAll;
document.getElementById('testBtn').onclick = testEdgeFunction;

// Refresh every 5 seconds
loadAuction();
setInterval(function() { loadAuction(); loadBids(); }, 5000);
</script>
</body>
</html>
