<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeAux • Admin Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #020617;
  font-family: 'Inter', sans-serif;
  color: #F0F3FA;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== BACKGROUND WAVES ===== */
.bg-waves {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

.wave-bg {
  position: absolute;
  width: 200%;
  height: 200%;
  filter: blur(100px);
  opacity: 0.15;
  animation: waveBgDrift 24s ease-in-out infinite;
  border-radius: 50%;
}

.wave-emerald-bg { background: radial-gradient(circle at 30% 40%, rgba(74, 158, 90, 0.4), transparent 70%); top: -40%; left: -20%; animation-delay: 0s; }
.wave-sapphire-bg { background: radial-gradient(circle at 50% 50%, rgba(58, 110, 165, 0.4), transparent 70%); top: -30%; left: -10%; animation-delay: 8s; }
.wave-ruby-bg { background: radial-gradient(circle at 70% 60%, rgba(158, 74, 74, 0.4), transparent 70%); top: -20%; left: 0%; animation-delay: 16s; }

@keyframes waveBgDrift {
  0% { transform: translate(0px, 0px) scale(1); opacity: 0.1; }
  50% { transform: translate(40px, -30px) scale(1.05); opacity: 0.2; }
  100% { transform: translate(-30px, 20px) scale(1); opacity: 0.1; }
}

/* ===== 3D TRADEAUX LOGO ===== */
.gem-logo-corner {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 9999;
  filter: drop-shadow(0 30px 50px rgba(124,252,0,0.5));
  transform-style: preserve-3d;
  perspective: 1000px;
  transform: scale(0.35);
  transform-origin: top left;
  pointer-events: none;
}

.gem-text {
  font-size: 160px;
  font-weight: 900;
  letter-spacing: -0.02em;
  position: relative;
  display: flex;
  text-transform: uppercase;
  line-height: 0.9;
  font-family: 'Orbitron', sans-serif;
  transform-style: preserve-3d;
  gap: 2px;
}

.gem-letter {
  display: inline-block;
  position: relative;
  transform-style: preserve-3d;
  animation: letterFloat 6s ease-in-out infinite;
  filter: brightness(1.2);
  font-size: 160px;
  font-weight: 900;
}

.gem-letter:nth-child(1) { animation-delay: 0s; }
.gem-letter:nth-child(2) { animation-delay: 0.2s; }
.gem-letter:nth-child(3) { animation-delay: 0.4s; }
.gem-letter:nth-child(4) { animation-delay: 0.6s; }
.gem-letter:nth-child(5) { animation-delay: 0.8s; }
.gem-letter:nth-child(6) { animation-delay: 1.0s; }
.gem-letter:nth-child(7) { animation-delay: 1.2s; }
.gem-letter:nth-child(8) { animation-delay: 1.4s; }

@keyframes letterFloat {
  0%, 100% { transform: translateY(0px) rotateX(2deg) rotateY(2deg); }
  50% { transform: translateY(-8px) rotateX(5deg) rotateY(5deg); }
}

/* T - Blue */
.gem-letter[data-letter="T"] {
  background: linear-gradient(145deg, #1a3a6a 0%, #2a5a9a 15%, #3a7aca 30%, #4a9aff 45%, #3a7aca 60%, #2a5a9a 75%, #1a3a6a 90%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
/* R - Green */
.gem-letter[data-letter="R"] {
  background: linear-gradient(145deg, #1a5a2a 0%, #2a8a3a 15%, #3aba4a 30%, #4aea5a 45%, #3aba4a 60%, #2a8a3a 75%, #1a5a2a 90%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
/* A - Red */
.gem-letter[data-letter="A"] {
  background: linear-gradient(145deg, #5a1a1a 0%, #8a2a2a 15%, #ba3a3a 30%, #ea4a4a 45%, #ba3a3a 60%, #8a2a2a 75%, #5a1a1a 90%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
/* D - Blue */
.gem-letter[data-letter="D"] {
  background: linear-gradient(145deg, #1a3a6a 0%, #2a5a9a 15%, #3a7aca 30%, #4a9aff 45%, #3a7aca 60%, #2a5a9a 75%, #1a3a6a 90%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
/* E - Green */
.gem-letter[data-letter="E"] {
  background: linear-gradient(145deg, #1a5a2a 0%, #2a8a3a 15%, #3aba4a 30%, #4aea5a 45%, #3aba4a 60%, #2a8a3a 75%, #1a5a2a 90%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
/* U - Blue */
.gem-letter[data-letter="U"] {
  background: linear-gradient(145deg, #1a3a6a 0%, #2a5a9a 15%, #3a7aca 30%, #4a9aff 45%, #3a7aca 60%, #2a5a9a 75%, #1a3a6a 90%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
/* X - Green */
.gem-letter[data-letter="X"] {
  background: linear-gradient(145deg, #1a5a2a 0%, #2a8a3a 15%, #3aba4a 30%, #4aea5a 45%, #3aba4a 60%, #2a8a3a 75%, #1a5a2a 90%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

/* 3D EDGES */
.gem-letter .edge-top, .gem-letter .edge-right, .gem-letter .edge-bottom, .gem-letter .edge-left { display: none; }

.light-source {
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2) 0%, rgba(124,252,0,0.1) 30%, transparent 70%);
  animation: rotateLight 15s linear infinite;
  pointer-events: none;
  z-index: 10;
  mix-blend-mode: overlay;
}

@keyframes rotateLight {
  0% { transform: rotate(0deg) scale(1); opacity: 0.3; }
  50% { transform: rotate(180deg) scale(1.2); opacity: 0.6; }
  100% { transform: rotate(360deg) scale(1); opacity: 0.3; }
}

.sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 15px 3px white, 0 0 25px 6px #7CFC00;
  animation: sparkleFlash 4s ease-in-out infinite;
  opacity: 0;
  z-index: 20;
  pointer-events: none;
}

@keyframes sparkleFlash {
  0% { opacity: 0; transform: scale(0.5); }
  10% { opacity: 1; transform: scale(1.2); }
  20% { opacity: 0.6; transform: scale(0.9); }
  30% { opacity: 1; transform: scale(1.1); }
  40% { opacity: 0; transform: scale(0.5); }
  100% { opacity: 0; transform: scale(0.5); }
}

.sparkle-1 { top: 15%; left: 12%; animation-delay: 0s; }
.sparkle-2 { top: 25%; left: 28%; animation-delay: 0.7s; }
.sparkle-3 { top: 70%; left: 22%; animation-delay: 1.4s; }
.sparkle-4 { top: 35%; left: 48%; animation-delay: 2.1s; }
.sparkle-5 { top: 80%; left: 42%; animation-delay: 2.8s; }
.sparkle-6 { top: 20%; left: 68%; animation-delay: 3.5s; }
.sparkle-7 { top: 55%; left: 78%; animation-delay: 4.2s; }
.sparkle-8 { top: 75%; left: 88%; animation-delay: 4.9s; }
.sparkle-9 { top: 45%; left: 15%; animation-delay: 5.6s; }
.sparkle-10 { top: 65%; left: 58%; animation-delay: 6.3s; }

.depth-shadow {
  position: absolute;
  bottom: -30px;
  left: 0;
  width: 100%;
  height: 60px;
  background: radial-gradient(ellipse at center, rgba(124,252,0,0.3) 0%, transparent 80%);
  filter: blur(20px);
  z-index: -1;
}

/* ===== HEADER & NAV ===== */
.glass-header {
  backdrop-filter: blur(14px);
  background: rgba(3, 5, 12, 0.7);
  border-bottom: 1px solid rgba(124,252,0,0.35);
  padding: 12px 28px;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  flex-wrap: wrap;
  position: relative;
  z-index: 2;
}

.nav-links {
  display: flex;
  gap: 20px;
}

.nav-links a {
  font-size: 0.75rem;
  font-weight: 600;
  color: #BFC9E0;
  text-decoration: none;
  padding: 6px 18px;
  border-radius: 40px;
  border: 1px solid rgba(124,252,0,0.3);
  transition: 0.2s;
  background: rgba(0,0,0,0.3);
}

.nav-links a:hover, .nav-links a.active {
  border-color: #7CFC00;
  color: #7CFC00;
}

/* ===== MAIN CONTENT ===== */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 48px 24px 80px;
  position: relative;
  z-index: 2;
}

h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 2rem;
  margin-bottom: 8px;
}

.admin-badge {
  background: #7CFC00;
  color: #020617;
  padding: 4px 12px;
  border-radius: 40px;
  font-size: 0.7rem;
  font-weight: 700;
  display: inline-block;
  margin-bottom: 24px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 40px;
}

.stat-card {
  background: linear-gradient(145deg, rgba(15, 32, 64, 0.85), rgba(2, 6, 23, 0.98));
  border-radius: 20px;
  border: 1px solid rgba(124,252,0,0.3);
  padding: 24px;
  text-align: center;
}

.stat-number {
  font-size: 2.5rem;
  font-weight: 800;
  color: #7CFC00;
  font-family: 'Orbitron', sans-serif;
}

.stat-label {
  font-size: 0.8rem;
  color: #9ca3af;
  margin-top: 8px;
}

.section {
  background: linear-gradient(145deg, rgba(15, 32, 64, 0.85), rgba(2, 6, 23, 0.98));
  border-radius: 24px;
  border: 1px solid rgba(124,252,0,0.3);
  padding: 24px;
  margin-bottom: 30px;
}

.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.2rem;
  margin-bottom: 20px;
  border-left: 3px solid #7CFC00;
  padding-left: 16px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  text-align: left;
  padding: 12px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

th {
  color: #7CFC00;
  font-weight: 600;
  font-size: 0.8rem;
}

td {
  font-size: 0.85rem;
  color: #C0C7D9;
}

.btn {
  background: rgba(124,252,0,0.15);
  border: 1px solid #7CFC00;
  padding: 4px 12px;
  border-radius: 20px;
  color: #7CFC00;
  cursor: pointer;
  font-size: 0.7rem;
}

.btn:hover {
  background: #7CFC00;
  color: #020617;
}

footer {
  margin-top: 40px;
  padding: 30px 0 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
  text-align: center;
  font-size: 12px;
  color: #9ca3af;
  position: relative;
  z-index: 2;
}

.hidden {
  display: none;
}

.loading {
  text-align: center;
  padding: 60px;
  color: #7CFC00;
  font-family: 'Orbitron', sans-serif;
}

@media (max-width: 800px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .gem-logo-corner { transform: scale(0.25); }
}
</style>
</head>
<body>

<!-- BACKGROUND WAVES -->
<div class="bg-waves">
  <div class="wave-bg wave-emerald-bg"></div>
  <div class="wave-bg wave-sapphire-bg"></div>
  <div class="wave-bg wave-ruby-bg"></div>
</div>

<!-- 3D TRADEAUX LOGO -->
<div class="gem-logo-corner">
  <div class="gem-text">
    <span class="gem-letter" data-letter="T">T</span>
    <span class="gem-letter" data-letter="R">R</span>
    <span class="gem-letter" data-letter="A">A</span>
    <span class="gem-letter" data-letter="D">D</span>
    <span class="gem-letter" data-letter="E">E</span>
    <span class="gem-letter" data-letter="A">A</span>
    <span class="gem-letter" data-letter="U">U</span>
    <span class="gem-letter" data-letter="X">X</span>
  </div>
  <div class="light-source"></div>
  <div class="sparkle sparkle-1"></div>
  <div class="sparkle sparkle-2"></div>
  <div class="sparkle sparkle-3"></div>
  <div class="sparkle sparkle-4"></div>
  <div class="sparkle sparkle-5"></div>
  <div class="sparkle sparkle-6"></div>
  <div class="sparkle sparkle-7"></div>
  <div class="sparkle sparkle-8"></div>
  <div class="sparkle sparkle-9"></div>
  <div class="sparkle sparkle-10"></div>
  <div class="depth-shadow"></div>
</div>

<!-- HEADER -->
<div class="glass-header">
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="dashboard-admin.html" class="active">Admin</a>
    <a href="signin.html">Sign Out</a>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="container" id="adminContent">
  <div class="loading" id="loadingMsg">🔐 Verifying admin access...</div>
  
  <div id="adminDashboard" class="hidden">
    <h1>Admin Dashboard</h1>
    <div class="admin-badge">👑 Administrator Access</div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="section">
      <div class="section-title">📊 Platform Overview</div>
      <div id="overviewStats"></div>
    </div>

    <div class="section">
      <div class="section-title">👥 Users</div>
      <table id="usersTable">
        <thead>
          <tr><th>Email</th><th>Role</th><th>Listings</th><th>Bids</th><th>Action</th></tr>
        </thead>
        <tbody id="usersTableBody"></tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-title">📦 Active Listings</div>
      <table id="listingsTable">
        <thead>
          <tr><th>Product</th><th>Seller</th><th>Quantity</th><th>Grade</th><th>Status</th></tr>
        </thead>
        <tbody id="listingsTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<footer>
  <div>© TradeAux — Global Surplus Exchange</div>
</footer>

<script>
const SUPABASE_URL = 'https://knceschbzidmqvosdwud.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtuY2VzY2hiemlkbXF2b3Nkd3VkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5NTY2MTgsImV4cCI6MjA4NjUzMjYxOH0.2lZXDSMAQwo4mD5y66-2d6kd6FXMvIFBmNbBgoSx56o';

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =====================================================
// ADMIN ACCESS CONTROL
// =====================================================

async function checkAdminAccess() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  
  if (!user) {
    window.location.href = '/signin.html?redirect=admin';
    return false;
  }
  
  const { data: profile, error } = await supabaseClient
    .from('profiles')
    .select('is_admin')
    .eq('id', user.id)
    .single();
  
  if (error || !profile?.is_admin) {
    alert('🚫 Admin access required. Redirecting to homepage.');
    window.location.href = '/index.html';
    return false;
  }
  
  console.log('✅ Admin access granted:', user.email);
  return true;
}

// =====================================================
// LOAD DASHBOARD DATA
// =====================================================

async function loadDashboardData() {
  try {
    const [usersCount, listingsCount, bidsCount, buyersCount] = await Promise.all([
      supabaseClient.from('profiles').select('*', { count: 'exact', head: true }),
      supabaseClient.from('seller_inventory').select('*', { count: 'exact', head: true }),
      supabaseClient.from('bids').select('*', { count: 'exact', head: true }),
      supabaseClient.from('trade_campaigns').select('*', { count: 'exact', head: true })
    ]);
    
    document.getElementById('statsGrid').innerHTML = `
      <div class="stat-card"><div class="stat-number">${usersCount.count || 0}</div><div class="stat-label">Users</div></div>
      <div class="stat-card"><div class="stat-number">${listingsCount.count || 0}</div><div class="stat-label">Listings</div></div>
      <div class="stat-card"><div class="stat-number">${bidsCount.count || 0}</div><div class="stat-label">Bids</div></div>
      <div class="stat-card"><div class="stat-number">${buyersCount.count || 0}</div><div class="stat-label">Buyer Briefs</div></div>
    `;
    
    const { data: users } = await supabaseClient
      .from('profiles')
      .select('id, email, is_admin')
      .order('created_at', { ascending: false });
    
    const usersHtml = users?.map(user => `
      <tr>
        <td>${user.email || 'No email'}</td>
        <td>${user.is_admin ? '👑 Admin' : '👤 User'}</td>
        <td>-</td>
        <td>-</td>
        <td><button class="btn" onclick="toggleAdmin('${user.id}', ${!user.is_admin})">${user.is_admin ? 'Remove Admin' : 'Make Admin'}</button></td>
      </tr>
    `).join('');
    
    document.getElementById('usersTableBody').innerHTML = usersHtml || '<tr><td colspan="5">No users found</td></tr>';
    
    const { data: listings } = await supabaseClient
      .from('seller_inventory')
      .select('product, quantity_mt, grade, status, user_id')
      .limit(20);
    
    const listingsHtml = listings?.map(listing => `
      <tr>
        <td>${listing.product || 'Unknown'}</td>
        <td>${listing.user_id?.slice(0, 8)}...</td>
        <td>${listing.quantity_mt || 0} MT</td>
        <td>${listing.grade || 'Standard'}</td>
        <td>${listing.status || 'active'}</td>
      </tr>
    `).join('');
    
    document.getElementById('listingsTableBody').innerHTML = listingsHtml || '<tr><td colspan="5">No listings found</td></tr>';
    
    document.getElementById('overviewStats').innerHTML = `
      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 16px;">
        <div style="padding: 16px; background: rgba(0,0,0,0.3); border-radius: 12px;"><strong>Total Users:</strong> ${usersCount.count || 0}</div>
        <div style="padding: 16px; background: rgba(0,0,0,0.3); border-radius: 12px;"><strong>Active Listings:</strong> ${listingsCount.count || 0}</div>
        <div style="padding: 16px; background: rgba(0,0,0,0.3); border-radius: 12px;"><strong>Total Bids:</strong> ${bidsCount.count || 0}</div>
        <div style="padding: 16px; background: rgba(0,0,0,0.3); border-radius: 12px;"><strong>Buyer Briefs:</strong> ${buyersCount.count || 0}</div>
      </div>
    `;
    
  } catch (error) {
    console.error('Error loading dashboard:', error);
  }
}

window.toggleAdmin = async function(userId, makeAdmin) {
  const { error } = await supabaseClient
    .from('profiles')
    .update({ is_admin: makeAdmin })
    .eq('id', userId);
  
  if (error) {
    alert('Error: ' + error.message);
  } else {
    alert(`User ${makeAdmin ? 'promoted to' : 'removed from'} admin`);
    loadDashboardData();
  }
};

// =====================================================
// INITIALIZE
// =====================================================

document.addEventListener('DOMContentLoaded', async () => {
  const isAdmin = await checkAdminAccess();
  if (isAdmin) {
    document.getElementById('loadingMsg').classList.add('hidden');
    document.getElementById('adminDashboard').classList.remove('hidden');
    await loadDashboardData();
  }
});
</script>
</body>
</html>
